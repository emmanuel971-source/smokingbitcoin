
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app {
  width: 100%; min-height: 520px;
  background: #080818;
  border-radius: var(--border-radius-lg);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  font-family: var(--font-sans);
}
canvas { display: block; width: 100%; touch-action: none; }
#dot {
  position: absolute; width: 16px; height: 16px;
  border-radius: 50%;
  background: #ff3c78;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 5;
}
#dot.on { background: #fff; }
#status {
  position: absolute; top: 12px; left: 0; right: 0;
  text-align: center; font-size: 12px;
  color: rgba(255,255,255,0.4); pointer-events: none; z-index: 4;
}
#hud {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px 14px; background: rgba(0,0,0,0.55);
  display: flex; gap: 10px; align-items: center; z-index: 4;
}
#hud-info { flex: 1; font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }
#btn-clear {
  width: 42px; height: 42px; border-radius: var(--border-radius-md);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#overlay {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(8,8,24,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 28px; text-align: center; color: #fff;
}
#overlay h3 { font-size: 20px; font-weight: 500; }
#overlay p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 320px; }
#btn-start {
  margin-top: 6px; padding: 13px 32px;
  border-radius: var(--border-radius-md);
  border: 1.5px solid #ff3c78;
  background: rgba(255,60,120,0.15);
  color: #ff6ba8; font-size: 15px;
  font-family: var(--font-sans); cursor: pointer;
}
#debug {
  position: absolute; top: 32px; left: 8px;
  font-size: 11px; color: rgba(255,255,255,0.3);
  pointer-events: none; z-index: 6; line-height: 1.6;
}
</style>

<div id="app">
  <canvas id="c"></canvas>
  <div id="dot"></div>
  <div id="status">initialisation…</div>
  <div id="debug"></div>
  <div id="hud">
    <div id="hud-info">Touche l'écran n'importe où pour tracer<br>Lève le doigt = crayon levé</div>
    <button id="btn-clear"><i class="ti ti-trash" aria-hidden="true"></i></button>
  </div>
  <div id="overlay">
    <h3>✦ Laser Kana</h3>
    <p>Tiens ton téléphone comme un sabre laser.<br>Le point suit l'inclinaison.<br><br><strong style="color:#ff6ba8">Touche l'écran</strong> pour tracer, lève le doigt pour lever le crayon.</p>
    <button id="btn-start">Démarrer</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');
const overlay = document.getElementById('overlay');
const btnStart = document.getElementById('btn-start');
const btnClear = document.getElementById('btn-clear');
const appEl = document.getElementById('app');
const hudInfo = document.getElementById('hud-info');

let W, H;
function resize() {
  W = appEl.clientWidth;
  H = Math.max(400, window.innerHeight > 600 ? 440 : 380);
  canvas.width = W;
  canvas.height = H;
  canvas.style.height = H + 'px';
  redrawAll();
}

let strokes = [];
let current = [];
let drawing = false;
let posX = 0.5, posY = 0.4;
let targetX = 0.5, targetY = 0.4;
let beta0 = null, gamma0 = null;
let gyroOk = false;
let lastRawB = 0, lastRawG = 0;
let lastPx = null, lastPy = null;

const SENS = 0.65;

function setStatus(t) { statusEl.textContent = t; }

function onOrientation(e) {
  const b = e.beta, g = e.gamma;
  if (b === null || g === null) return;
  gyroOk = true;
  lastRawB = b; lastRawG = g;
  debugEl.textContent = `β=${b.toFixed(1)}° γ=${g.toFixed(1)}°`;
  if (beta0 === null) { beta0 = b; gamma0 = g; return; }
  const db = b - beta0;
  const dg = g - gamma0;
  targetX = Math.max(0.02, Math.min(0.98, 0.5 + dg * SENS / 45));
  targetY = Math.max(0.02, Math.min(0.96, 0.4 + db * SENS / 45));
}

function lerp(a, b, t) { return a + (b - a) * t; }

function loop() {
  posX = lerp(posX, targetX, 0.15);
  posY = lerp(posY, targetY, 0.15);
  const px = posX * W;
  const py = posY * H;
  dot.style.left = px + 'px';
  dot.style.top = py + 'px';
  if (drawing) {
    if (lastPx !== null) {
      const dist = Math.hypot(px - lastPx, py - lastPy);
      if (dist > 0.5) {
        ctx.beginPath();
        ctx.moveTo(lastPx, lastPy);
        ctx.lineTo(px, py);
        ctx.strokeStyle = '#ff3c78';
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        current.push({ x: px, y: py });
      }
    } else {
      current = [{ x: px, y: py }];
    }
    lastPx = px; lastPy = py;
  } else {
    lastPx = null; lastPy = null;
  }
  requestAnimationFrame(loop);
}

function redrawAll() {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = '#ff3c78';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const s of strokes) {
    if (s.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(s[0].x, s[0].y);
    for (let i = 1; i < s.length; i++) ctx.lineTo(s[i].x, s[i].y);
    ctx.stroke();
  }
}

function startStroke() {
  if (drawing) return;
  drawing = true;
  dot.classList.add('on');
  current = [];
  lastPx = null; lastPy = null;
}

function endStroke() {
  if (!drawing) return;
  drawing = false;
  dot.classList.remove('on');
  if (current.length > 1) strokes.push([...current]);
  current = [];
  lastPx = null; lastPy = null;
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startStroke(); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); endStroke(); }, { passive: false });
canvas.addEventListener('touchcancel', (e) => { e.preventDefault(); endStroke(); }, { passive: false });
canvas.addEventListener('mousedown', startStroke);
canvas.addEventListener('mouseup', endStroke);
canvas.addEventListener('mouseleave', endStroke);

canvas.addEventListener('mousemove', (e) => {
  if (!gyroOk) {
    const rect = canvas.getBoundingClientRect();
    targetX = Math.max(0.02, Math.min(0.98, (e.clientX - rect.left) / W));
    targetY = Math.max(0.02, Math.min(0.96, (e.clientY - rect.top) / H));
  }
});

btnClear.addEventListener('click', () => {
  strokes = []; current = [];
  ctx.clearRect(0, 0, W, H);
});

async function start() {
  overlay.style.display = 'none';
  window.addEventListener('deviceorientation', onOrientation, true);
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r !== 'granted') {
        setStatus('Permission refusée — mode souris actif');
        hudInfo.textContent = 'Mode souris : bouge la souris, clique pour tracer';
        return;
      }
    } catch(err) {
      setStatus('Erreur permission gyroscope');
    }
  }
  setStatus('En attente du gyroscope…');
  setTimeout(() => {
    if (!gyroOk) {
      setStatus('Gyroscope non détecté — mode souris actif');
      hudInfo.textContent = 'Mode souris : bouge la souris, clique pour tracer';
    } else {
      setStatus('Gyroscope actif ✓');
      hudInfo.textContent = 'Incline le téléphone • Touche = tracer • Lève = lever le crayon';
    }
  }, 2000);
}

btnStart.addEventListener('click', start);
window.addEventListener('resize', resize);
resize();
loop();
</script>
