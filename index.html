
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#app {
  width: 100%;
  min-height: 520px;
  background: #0a0a1a;
  border-radius: var(--border-radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
  position: relative;
}
canvas {
  display: block;
  width: 100%;
  touch-action: none;
}
#status {
  position: absolute;
  top: 14px;
  left: 0; right: 0;
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-sans);
  pointer-events: none;
}
#controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: space-between;
}
#btn-draw {
  flex: 1;
  height: 48px;
  border-radius: var(--border-radius-md);
  border: 1.5px solid rgba(255, 60, 120, 0.6);
  background: rgba(255, 60, 120, 0.12);
  color: #ff6ba8;
  font-size: 14px;
  font-family: var(--font-sans);
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
#btn-draw.active {
  background: rgba(255, 60, 120, 0.35);
  border-color: #ff3c78;
  color: #fff;
}
#btn-clear {
  width: 48px;
  height: 48px;
  border-radius: var(--border-radius-md);
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#dot {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #ff3c78;
  box-shadow: 0 0 8px 3px rgba(255,60,120,0.7);
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: background 0.1s;
}
#dot.drawing {
  background: #fff;
  box-shadow: 0 0 12px 5px rgba(255,60,120,1);
}
#info-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10,10,26,0.92);
  color: #fff;
  font-family: var(--font-sans);
  text-align: center;
  padding: 24px;
  gap: 16px;
  z-index: 10;
}
#info-overlay p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; }
#info-overlay h3 { font-size: 18px; font-weight: 500; }
#btn-start {
  padding: 12px 28px;
  border-radius: var(--border-radius-md);
  border: 1.5px solid #ff3c78;
  background: rgba(255,60,120,0.15);
  color: #ff6ba8;
  font-size: 15px;
  font-family: var(--font-sans);
  cursor: pointer;
  margin-top: 8px;
}
#mode-toggle {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--border-radius-md);
  padding: 4px 10px;
  cursor: pointer;
  z-index: 5;
  font-family: var(--font-sans);
}
</style>

<div id="app">
  <canvas id="c"></canvas>
  <div id="dot"></div>
  <div id="status">En attente du gyroscope…</div>
  <button id="mode-toggle">Mode souris</button>

  <div id="controls">
    <button id="btn-draw">☞ Maintenir pour tracer</button>
    <button id="btn-clear"><i class="ti ti-trash" aria-hidden="true"></i></button>
  </div>

  <div id="info-overlay">
    <h3>✦ Laser Kana POC</h3>
    <p>Oriente ton téléphone comme un sabre laser.<br>Le point rouge suit l'inclinaison du téléphone.<br>Maintiens le bouton pour tracer.</p>
    <p style="font-size:12px; color:rgba(255,255,255,0.35)">Sur mobile, l'accès au gyroscope peut nécessiter une autorisation.</p>
    <button id="btn-start">Démarrer</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dot = document.getElementById('dot');
const status = document.getElementById('status');
const btnDraw = document.getElementById('btn-draw');
const btnClear = document.getElementById('btn-clear');
const overlay = document.getElementById('info-overlay');
const btnStart = document.getElementById('btn-start');
const modeToggle = document.getElementById('mode-toggle');
const appEl = document.getElementById('app');

let W, H;
function resize() {
  W = appEl.clientWidth;
  H = Math.max(420, appEl.clientHeight - 72);
  canvas.width = W;
  canvas.height = H;
  canvas.style.height = H + 'px';
  redrawStrokes();
}

let drawing = false;
let strokes = [];
let currentStroke = [];

let posX = 0.5, posY = 0.35;
let targetX = 0.5, targetY = 0.35;

let mouseMode = false;
let gyroAvailable = false;

let beta0 = null, gamma0 = null;
const SENSITIVITY = 2.2;

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function onOrientation(e) {
  if (e.beta === null) return;
  gyroAvailable = true;
  if (beta0 === null) { beta0 = e.beta; gamma0 = e.gamma; }
  let db = e.beta - beta0;
  let dg = e.gamma - gamma0;
  targetX = clamp(0.5 + (dg / 45) * SENSITIVITY * 0.5, 0.02, 0.98);
  targetY = clamp(0.35 + (db / 45) * SENSITIVITY * 0.5, 0.02, 0.95);
  status.textContent = `β ${e.beta.toFixed(1)}°  γ ${e.gamma.toFixed(1)}°  — gyroscope actif`;
}

window.addEventListener('deviceorientation', onOrientation);

function lerp(a, b, t) { return a + (b - a) * t; }

let lastX = null, lastY = null;

function loop() {
  posX = lerp(posX, targetX, 0.18);
  posY = lerp(posY, targetY, 0.18);

  const px = posX * W;
  const py = posY * H;

  dot.style.left = px + 'px';
  dot.style.top = py + 'px';

  if (drawing) {
    if (lastX !== null) {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(px, py);
      ctx.strokeStyle = '#ff3c78';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(255,60,120,0.6)';
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
      currentStroke.push({ x: px, y: py });
    } else {
      currentStroke = [{ x: px, y: py }];
    }
    lastX = px; lastY = py;
  } else {
    lastX = null; lastY = null;
  }

  requestAnimationFrame(loop);
}

function redrawStrokes() {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = '#ff3c78';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const stroke of strokes) {
    if (stroke.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
  }
}

function startDraw() {
  drawing = true;
  dot.classList.add('drawing');
  btnDraw.classList.add('active');
  btnDraw.textContent = '✦ Tracé actif';
  currentStroke = [];
}

function stopDraw() {
  drawing = false;
  dot.classList.remove('drawing');
  btnDraw.classList.remove('active');
  btnDraw.textContent = '☞ Maintenir pour tracer';
  if (currentStroke.length > 1) strokes.push([...currentStroke]);
  currentStroke = [];
}

btnDraw.addEventListener('pointerdown', startDraw);
btnDraw.addEventListener('pointerup', stopDraw);
btnDraw.addEventListener('pointerleave', stopDraw);

btnClear.addEventListener('click', () => {
  strokes = [];
  currentStroke = [];
  ctx.clearRect(0, 0, W, H);
});

modeToggle.addEventListener('click', () => {
  mouseMode = !mouseMode;
  modeToggle.textContent = mouseMode ? 'Mode gyroscope' : 'Mode souris';
  if (mouseMode) {
    status.textContent = 'Mode souris actif — bouge ta souris sur le canvas';
    beta0 = null; gamma0 = null;
  } else {
    beta0 = null; gamma0 = null;
    status.textContent = 'Gyroscope — bouge ton téléphone';
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!mouseMode) return;
  const rect = canvas.getBoundingClientRect();
  targetX = clamp((e.clientX - rect.left) / W, 0.02, 0.98);
  targetY = clamp((e.clientY - rect.top) / H, 0.02, 0.95);
});

canvas.addEventListener('pointerdown', (e) => {
  if (!mouseMode) return;
  const rect = canvas.getBoundingClientRect();
  targetX = clamp((e.clientX - rect.left) / W, 0.02, 0.98);
  targetY = clamp((e.clientY - rect.top) / H, 0.02, 0.95);
  startDraw();
});
canvas.addEventListener('pointerup', () => { if (mouseMode) stopDraw(); });
canvas.addEventListener('pointerleave', () => { if (mouseMode) stopDraw(); });

async function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') {
        status.textContent = 'Permission gyroscope refusée — utilise le mode souris';
        mouseMode = true;
        modeToggle.textContent = 'Mode gyroscope';
        return;
      }
    } catch(e) {
      status.textContent = 'Erreur permission — mode souris activé';
      mouseMode = true;
    }
  }
  status.textContent = 'En attente du gyroscope…';
  setTimeout(() => {
    if (!gyroAvailable) {
      status.textContent = 'Gyroscope non détecté — mode souris activé';
      mouseMode = true;
      modeToggle.textContent = 'Mode gyroscope';
    }
  }, 1500);
}

btnStart.addEventListener('click', async () => {
  overlay.style.display = 'none';
  await requestGyro();
  beta0 = null; gamma0 = null;
});

window.addEventListener('resize', resize);
resize();
loop();
</script>
