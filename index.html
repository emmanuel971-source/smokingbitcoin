<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laser POC debug</title>

<style>
html,body{
  margin:0;
  background:black;
  overflow:hidden;
  touch-action:none;
  font-family:sans-serif;
}

canvas{ display:block; }

#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:14px;
  z-index:10;
}

button{
  margin-right:10px;
  padding:8px 12px;
}
</style>
</head>
<body>

<div id="ui">
  <button id="start">Activer</button>
  <button id="center">Recentrer</button>
  <button id="clear">Effacer</button>
  <div id="debug">waiting...</div>
</div>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let centerBeta = 0;
let centerGamma = 0;

let beta = 0;
let gamma = 0;

let lastX = null;
let lastY = null;

let sensorActive = false;

function draw(x,y){

  if(lastX !== null){
    ctx.strokeStyle = "#00ff00";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(lastX,lastY);
    ctx.lineTo(x,y);
    ctx.stroke();
  }

  ctx.fillStyle="#00ff00";
  ctx.beginPath();
  ctx.arc(x,y,6,0,Math.PI*2);
  ctx.fill();

  lastX = x;
  lastY = y;
}

function clear(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  lastX = null;
  lastY = null;
}

clear();

function updateDebug(txt){
  document.getElementById("debug").textContent = txt;
}

function handle(event){

  beta = event.beta;
  gamma = event.gamma;

  if(beta === null || gamma === null){
    updateDebug("⚠️ capteurs null (deviceorientation OK mais valeurs vides)");
    return;
  }

  const relB = beta - centerBeta;
  const relG = gamma - centerGamma;

  const x = canvas.width/2 + relG * 8;
  const y = canvas.height/2 + relB * 8;

  draw(x,y);

  updateDebug(
    `β:${beta?.toFixed?.(1)} γ:${gamma?.toFixed?.(1)}`
  );
}

// fallback test animation (très important)
function fakeMotion(){
  if(sensorActive) return;

  const t = Date.now()/300;

  const x = canvas.width/2 + Math.sin(t)*200;
  const y = canvas.height/2 + Math.cos(t*0.8)*200;

  draw(x,y);
  updateDebug("⚠️ fallback animation (capteur NON actif)");
  requestAnimationFrame(fakeMotion);
}
fakeMotion();

async function start(){

  if(typeof DeviceOrientationEvent !== "undefined"
     && typeof DeviceOrientationEvent.requestPermission === "function"){

    const p = await DeviceOrientationEvent.requestPermission();
    if(p !== "granted"){
      alert("Permission refusée");
      return;
    }
  }

  window.addEventListener("deviceorientation", handle, true);
  window.addEventListener("deviceorientationabsolute", handle, true);

  sensorActive = true;

  alert("Capteurs activés");
}

document.getElementById("start").onclick = start;

document.getElementById("clear").onclick = clear;

document.getElementById("center").onclick = () => {
  centerBeta = beta;
  centerGamma = gamma;
  lastX = lastY = null;
};

</script>

</body>
</html>
